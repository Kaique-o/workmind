<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Acesso | Workmind</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: linear-gradient(135deg, var(--primary-navy), #0a1a7a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-24);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: var(--radius-xl);
            padding: var(--space-32);
            box-shadow: var(--shadow-premium);
            text-align: center;
        }

        .profile-btn {
            width: 100%;
            padding: var(--space-24);
            border: 2px solid var(--gray-light);
            border-radius: var(--radius-lg);
            background: white;
            display: flex;
            align-items: center;
            gap: var(--space-16);
            text-decoration: none;
            transition: all 0.2s;
            margin-bottom: var(--space-16);
            text-align: left;
        }

        .profile-btn:hover {
            border-color: var(--accent-orange);
            background: var(--bg-ice);
        }

        .profile-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="flex justify-center items-center gap-sm mb-32">
            <div style="width: 40px; height: 40px; background: var(--primary-navy); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                <i data-lucide="brain" style="color: white; width: 22px;"></i>
            </div>
            <span class="font-bold text-2xl text-primary">Workmind</span>
        </div>

        <h2 class="mb-8">Seja bem-vindo</h2>
        <p class="text-sm mb-32">Escolha seu perfil de acesso para continuar.</p>

        <div class="flex flex-col">
            <a href="colaborador.html" class="profile-btn">
                <div class="profile-icon" style="background: #f0fdf4;">
                    <i data-lucide="user" class="text-success"></i>
                </div>
                <div>
                    <h4 class="text-sm font-bold">Colaborador</h4>
                    <p class="text-xs">Espaço seguro e anônimo.</p>
                </div>
            </a>

            <a href="empresa.html" class="profile-btn">
                <div class="profile-icon" style="background: #eff6ff;">
                    <i data-lucide="building-2" class="text-primary"></i>
                </div>
                <div>
                    <h4 class="text-sm font-bold">Empresa / Gestor</h4>
                    <p class="text-xs">Painel executivo e compliance.</p>
                </div>
            </a>
        </div>

        <p class="text-xs" style="margin-top: var(--space-24); opacity: 0.5;">
            Segurança de dados padrão Enterprise.
        </p>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
